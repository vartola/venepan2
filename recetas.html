<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recetas - VENEPAN</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
<div class="container">

<aside class="sidebar"></aside>

  
    <main class="main-content">

       
        <header class="top-bar">
            <div class="page-info">
                <h2>Maestro de Recetas</h2>
                <span>Fórmulas estándar para cada tipo de pan</span>
            </div>
        </header>

        <section class="card-section">

     
            <div class="card card-recetas">
                <div class="card-header">
                    <h3><i class="fas fa-mitten"></i> Crear Nueva Fórmula</h3>
                </div>

                <div class="grid-form">

                    <div class="input-group" style="grid-column: span 2;">
                        <label>Nombre de la Receta (Producto)</label>
                        <select id="receta-producto">
                            <option value="integral">PAN INTEGRAL</option>
                            <option value="ajonjoli">PAN C/ AJONJOLÍ</option>
                            <option value="blanco">PAN BLANCO</option>
                            <option value="miel">PAN MIEL</option>
                            <option value="hamburguesa">PAN HAMBURGUESA</option>
                            <option value="perrocaliente">PAN PERRO CALIENTE</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Harina (Kg por Medida)</label>
                        <input type="number" id="ing-harina" placeholder="0.00" step="0.01">
                    </div>

                    <div class="input-group">
                        <label>Levadura (Gr por Medida)</label>
                        <input type="number" id="ing-levadura" placeholder="0">
                    </div>

                    <div class="input-group">
                        <label>Soya Líquida (Lts por Medida)</label>
                        <input type="number" id="ing-soya" placeholder="0.00">
                    </div>

                    <div class="input-group">
                        <label>Cereales/Semillas (Gr)</label>
                        <input type="number" id="ing-cereales" placeholder="0">
                    </div>

                </div>

                <button id="btn-guardar-receta" class="btn-primary">
                    <i class="fas fa-save"></i> GUARDAR FÓRMULA
                </button>
            </div>

        </section>

 
        <div class="tables-container">

            <div class="card tabla-producto">
                <div class="card-header">
                    <h3><i class="fas fa-book"></i> Recetario Registrado</h3>
                </div>

                <div style="overflow-x:auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Harina</th>
                                <th>Levadura</th>
                                <th>Soya</th>
                                <th>Cereales</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="lista-recetas"></tbody>
                    </table>
                </div>

            </div>

        </div>

    </main>
</div>

<script src="menu.js"></script>
<script src="recetas.js"></script>
</body>
</html>
